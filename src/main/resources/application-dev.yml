spring:
  # 数据源配置 - MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.0.222:3306/blog_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  # Redis配置
  data:
    redis:
      host: 192.168.0.222
      port: 6379
      password:  # 如果有密码就填写
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # RabbitMQ配置
  rabbitmq:
    host: 192.168.0.222
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    # 消费者确认机制
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

# MongoDB配置（移到外层）
mongodb:
  uri: mongodb://192.168.0.222:27017/blog_system

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    # 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 驼峰转下划线
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键类型
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # mapper.xml位置
  mapper-locations: classpath:mapper/**/*.xml

# 日志配置
logging:
  level:
    com.blog: debug
    org.springframework.security: debug
  pattern:
    console: '%d{yyyy年MM月dd日 HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'