spring:
  profiles:
    active: dev  # 激活开发环境配置

  application:
    name: blog-system

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# JWT配置
jwt:
  secret: your-256-bit-secret-key-change-this-in-production-environment-blog-system-2026
  expiration: 86400000  # 24小时（毫秒）
  header: Authorization
  prefix: Bearer

# 文件上传配置
file:
  upload:
    path: /uploads/
    max-size: 10485760  # 10MB